name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run rollup && npm run add-version

      - name: Verify output
        run: test -f dist/dreame-vacuum-card.js

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/dreame-vacuum-card.js
          generate_release_notes: true
